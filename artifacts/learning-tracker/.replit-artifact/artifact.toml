kind = "web"
previewPath = "/"
title = "Learning Tracker"
version = "1.0.0"
id = "artifacts/learning-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18714

[services.development]
run = "pnpm --filter @workspace/learning-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/learning-tracker", "run", "build" ]
publicDir = "artifacts/learning-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18714"
BASE_PATH = "/"
